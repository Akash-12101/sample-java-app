version: 0.2

phases:
  pre_build:
    commands:
      - IMAGE_NAME=757367946571.dkr.ecr.ap-south-1.amazonaws.com/java-container-repo
      - IMAGE_TAG=latest
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin $REPOSITORY_URI

  build:
    commands:
      - mvn clean install
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t $IMAGE_NAME:$IMAGE_TAG .

  post_build:
    commands:
      - echo Pushing the Docker image to ECR...
      - docker push $IMAGE_NAME:$IMAGE_TAG
      - echo Creating imagedefinitions.json for ECS...
      - DOCKER_CONTAINER_NAME=app-java
      - printf '[{"name":"%s","imageUri":"%s"}]' "$DOCKER_CONTAINER_NAME" "$REPOSITORY_URI:$IMAGE_TAG" > imagedefinitions.json
      - echo imagedefinitions.json content:
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
